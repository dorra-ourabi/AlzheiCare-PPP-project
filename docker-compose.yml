version: "3.9"

services:
  db:
    image: postgres
    container_name: alzheicare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${database_user}
      POSTGRES_PASSWORD: ${database_password}
      POSTGRES_DB: alzheicare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: